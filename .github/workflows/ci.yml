name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  bun:
    name: Bun Test Build Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Seed docs cache for smoke
        run: |
          mkdir -p "$HOME/.cache/marten-docs-mcp"
          cp eval/telemetry/smoke-llms.txt "$HOME/.cache/marten-docs-mcp/llms-full.txt"
          cat > "$HOME/.cache/marten-docs-mcp/metadata.json" <<EOF
          {
            "sourceUrl": "https://martendb.io/llms-full.txt",
            "fetchedAt": "2030-01-01T00:00:00.000Z",
            "lastValidatedAt": "2030-01-01T00:00:00.000Z",
            "etag": null,
            "lastModified": null,
            "sha256": "seeded-for-ci",
            "chunkCount": 1,
            "parserVersion": "v2",
            "indexVersion": "v1"
          }
          EOF

      - name: Run tests
        run: bun test

      - name: Build release artifacts
        run: bun run build:release

      - name: Smoke via Bun bundle runtime
        env:
          MARTEN_MCP_STORAGE_MODE: sqlite
          MARTEN_MCP_SQLITE_DRIVER: bun-sqlite
        run: bun run smoke -- --server bun-bundle "aggregate projections"

      - name: Lifecycle scripts (install/verify/upgrade/uninstall)
        run: |
          TMP_ROOT=$(mktemp -d)
          bun run install:local -- --install-dir "$TMP_ROOT/install" --bin-dir "$TMP_ROOT/bin" --cache-dir "$TMP_ROOT/cache"
          bun run verify:local -- --install-dir "$TMP_ROOT/install" --bin-dir "$TMP_ROOT/bin"
          bun run upgrade:local -- --install-dir "$TMP_ROOT/install" --bin-dir "$TMP_ROOT/bin"
          bun run uninstall:local -- --install-dir "$TMP_ROOT/install" --bin-dir "$TMP_ROOT/bin" --cache-dir "$TMP_ROOT/cache" --purge-cache

  node:
    name: Node Build Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Seed docs cache for smoke
        run: |
          mkdir -p "$HOME/.cache/marten-docs-mcp"
          cp eval/telemetry/smoke-llms.txt "$HOME/.cache/marten-docs-mcp/llms-full.txt"
          cat > "$HOME/.cache/marten-docs-mcp/metadata.json" <<EOF
          {
            "sourceUrl": "https://martendb.io/llms-full.txt",
            "fetchedAt": "2030-01-01T00:00:00.000Z",
            "lastValidatedAt": "2030-01-01T00:00:00.000Z",
            "etag": null,
            "lastModified": null,
            "sha256": "seeded-for-ci",
            "chunkCount": 1,
            "parserVersion": "v2",
            "indexVersion": "v1"
          }
          EOF

      - name: Build release artifacts
        run: bun run build:release

      - name: Smoke via Node bundle runtime
        env:
          MARTEN_MCP_STORAGE_MODE: sqlite
          MARTEN_MCP_SQLITE_DRIVER: node-sqlite
        run: bun run smoke -- --server node-bundle "aggregate projections"
