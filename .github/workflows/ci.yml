name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  bun:
    name: Bun Test Build Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

      - name: Build release artifacts
        run: bun run build:release

      - name: Smoke via Bun bundle runtime
        env:
          MARTEN_MCP_STORAGE_MODE: sqlite
          MARTEN_MCP_SQLITE_DRIVER: bun-sqlite
        run: bun run smoke -- --server bun-bundle "aggregate projections"

  node:
    name: Node Build Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build release artifacts
        run: bun run build:release

      - name: Smoke via Node bundle runtime
        env:
          MARTEN_MCP_STORAGE_MODE: sqlite
          MARTEN_MCP_SQLITE_DRIVER: node-sqlite
        run: bun run smoke -- --server node-bundle "aggregate projections"
