name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Validate tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Build release artifacts
        run: bun run build:release

      - name: Pack release assets
        run: |
          tar -czf marten-docs-mcp-bundle-${GITHUB_REF_NAME}.tar.gz bundle
          tar -czf marten-docs-mcp-dist-${GITHUB_REF_NAME}.tar.gz dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            marten-docs-mcp-bundle-${{ github.ref_name }}.tar.gz
            marten-docs-mcp-dist-${{ github.ref_name }}.tar.gz
